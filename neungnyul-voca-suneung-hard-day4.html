<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>능률 보카 수능 하드 Day 4</title>
<style>
  body{
    margin:0;
    background:#0b1220;
    color:#fff;
    font-family:system-ui, -apple-system, "Noto Sans KR", sans-serif;
    height:100vh;
    overflow:hidden;
    user-select:none;
    touch-action:manipulation;
  }
  #wrap{
    max-width:480px;
    margin:0 auto;
    height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    padding:14px;
    background:#111a2b;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  #english{
    font-size:22px;
    font-weight:800;
    letter-spacing:.2px;
  }
  #progress{
    margin-top:6px;
    font-size:13px;
    opacity:.85;
  }
  #game{
    flex:1;
    position:relative;
    overflow:hidden;
    background:#0f172a;
  }
  .floor{
    position:absolute;
    bottom:0; left:0; right:0;
    height:60px;
    background:rgba(255,80,80,.22);
    border-top:1px solid rgba(255,80,80,.45);
    text-align:center;
    line-height:60px;
    font-size:13px;
    z-index:2;
    pointer-events:none;
  }
  .choice{
    position:absolute;
    left:10px;
    right:10px;
    height:56px;
    background:#1e293b;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 10px;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    z-index:1;
    top:0;
  }
  .choice.good{
    background:#065f46;
    border-color:rgba(94,234,212,.35);
  }
  .choice.bad{
    background:#7f1d1d;
    border-color:rgba(251,113,133,.55);
  }

  #overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.72);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    z-index:3;
  }
  .card{
    background:#111a2b;
    padding:20px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    text-align:center;
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 18px 50px rgba(0,0,0,.35);
  }
  .card h2{
    margin:0 0 10px;
    font-size:20px;
  }
  .card p{
    margin:0 0 12px;
    font-size:13px;
    opacity:.9;
    line-height:1.5;
  }
  button{
    width:100%;
    margin-top:12px;
    padding:12px;
    font-size:15px;
    font-weight:900;
    border-radius:12px;
    border:none;
    background:#38bdf8;
    cursor:pointer;
  }
  button.secondary{
    background:#1f2a44;
    color:#fff;
    border:1px solid rgba(255,255,255,.10);
  }
</style>
</head>
<body>

<div id="wrap">
  <header>
    <div id="english">능률 보카 수능 하드 Day 3</div>
    <div id="progress"></div>
  </header>

  <div id="game">
    <div class="floor">바닥 도달 = 즉시 불합격</div>

    <div id="overlay">
      <div class="card">
        <h2 id="ovTitle">능률 보카 수능 하드 Day 3</h2>
        <p id="ovText">
          화면 위 영어 단어에 맞는 한국어를 터치하세요.<br>
          <b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.
        </p>
        <button id="startBtn">시험 시작</button>
        <button id="restartBtn" class="secondary" style="display:none;">다시 시작</button>
      </div>
    </div>
  </div>
</div>

<script>
const GAME_TITLE = "능률 보카 수능 하드 Day 3";

const words = [
  { en:"resource", ko:"자원, 재원, 자산" },
  { en:"shed", ko:"없애다" },
  { en:"slam", ko:"쾅 닫다" },
  { en:"privilege", ko:"특권, 특혜" },
  { en:"decent", ko:"괜찮은, 점잖은, 예의 바른" },
  { en:"skyrocket", ko:"급등하다" },
  { en:"infer", ko:"추론하다, 추측하다" },
  { en:"deadly", ko:"치명적인, 극도의" },
  { en:"seemingly", ko:"외견상으로, 겉보기에는" },
  { en:"communal", ko:"공동의, 공용의, 공동체의, 지역 사회의" },
  { en:"compel", ko:"강요하다, 강제하다, 자아내다" },
  { en:"paradigm", ko:"전형적인 예, 패러다임" },
  { en:"formulate", ko:"(세심하게) 만들어 내다, (명확하게) 표현하다" },
  { en:"fulfill", ko:"실현하다, 이행하다, 충족시키다" },
  { en:"immerse", ko:"담그다, 몰두하다" },
  { en:"craftsmanship", ko:"손재주, 솜씨" },
  { en:"relate", ko:"관련시키다, 관련되다, 이야기하다, 이해하다, 공감하다" },
  { en:"authority", ko:"권위, 권한, 당국, 권위자" },
  { en:"consolidate", ko:"강화하다, 통합하다, 합병하다" },
  { en:"intervene", ko:"개입하다, 중재하다, 끼어들다" },
  { en:"merely", ko:"단지, 한낱, 그저" },
  { en:"stance", ko:"입장, 태도, 자세" },
  { en:"archaeologist", ko:"고고학자" },
  { en:"cosmos", ko:"우주" },
  { en:"anticipate", ko:"예상하다, 예측하다, 기대하다, 고대하다" },
  { en:"crude", ko:"천연 그대로의, 대충의, 조잡한" },
  { en:"predator", ko:"포식자, 포식 동물, 약탈자" },
  { en:"inflate", ko:"부풀리다, 부풀다, 올리다, 오르다, 과장하다" },
  { en:"personnel", ko:"인원, 직원들, 인사과" },
  { en:"blush", ko:"얼굴을 붉히다, 얼굴이 빨개지다" },
  { en:"pay off", ko:"다 갚다, 성과를 거두다" },
  { en:"wipe out", ko:"완전히 파괴하다, 없애 버리다" },
  { en:"stem from", ko:"~에서 비롯되다, 유래되다" },
  { en:"come across", ko:"우연히 마주치다, 발견하다, 인상을 주다, 전달되다, 이해되다" }
];

const PASS_MESSAGE = "축하합니다. 능률 보카 수능 하드 Day 3 테스트 통과!";
const baseSpeed = 110;
const floorHeight = 60;
const choiceHeight = 56;
const startYs = [-220, -320, -420, -520];

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const gameEl = document.getElementById("game");
const englishEl = document.getElementById("english");
const progressEl = document.getElementById("progress");

const overlayEl = document.getElementById("overlay");
const ovTitle = document.getElementById("ovTitle");
const ovText = document.getElementById("ovText");
const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");

let deck = [];
let idx = 0;
let choices = [];
let raf = null;
let running = false;
let roundStartTs = 0;
let locked = false;

function showOverlay(title, htmlText, showStart, showRestart){
  ovTitle.textContent = title;
  ovText.innerHTML = htmlText;
  overlayEl.style.display = "flex";
  startBtn.style.display = showStart ? "" : "none";
  restartBtn.style.display = showRestart ? "" : "none";
}

function hideOverlay(){
  overlayEl.style.display = "none";
}

function clearChoices(){
  for(const el of choices){
    el.remove();
  }
  choices = [];
}

function stopLoop(){
  running = false;
  if(raf){
    cancelAnimationFrame(raf);
    raf = null;
  }
}

function resetGame(){
  stopLoop();
  clearChoices();
  deck = shuffle(words);
  idx = 0;
  locked = false;
  englishEl.textContent = GAME_TITLE;
  progressEl.textContent = `0 / ${deck.length}`;
}

function startGame(){
  resetGame();
  hideOverlay();
  nextWord();
}

function nextWord(){
  if(idx >= deck.length){
    stopLoop();
    clearChoices();
    showOverlay(
      "합격",
      `<b style="font-size:18px;">${PASS_MESSAGE}</b><br><br>총 <b>${deck.length}</b>단어를 모두 통과했습니다.`,
      false,
      true
    );
    return;
  }

  locked = false;

  const w = deck[idx];
  englishEl.textContent = w.en;
  progressEl.textContent = `${idx + 1} / ${deck.length}`;

  spawnChoices(w);
  startLoop();
}

function fail(reason){
  stopLoop();
  clearChoices();
  showOverlay(
    "불합격",
    `${reason}<br><br><b>규칙:</b> 오답 선택 또는 어떤 선택지든 바닥 도달 시 즉시 종료됩니다.`,
    false,
    true
  );
}

function pick(el){
  if(!running || locked) return;
  locked = true;

  if(el.dataset.correct !== "1"){
    el.classList.add("bad");
    setTimeout(() => fail("오답을 선택했습니다."), 120);
    return;
  }

  el.classList.add("good");
  stopLoop();

  setTimeout(() => {
    clearChoices();
    idx += 1;
    nextWord();
  }, 180);
}

function spawnChoices(word){
  clearChoices();

  const correct = word.ko;
  const pool = Array.from(new Set(words.map(x => x.ko))).filter(v => v !== correct);
  const wrongs = shuffle(pool).slice(0, 3);
  const options = shuffle([correct, ...wrongs]);

  options.forEach((txt, i) => {
    const el = document.createElement("div");
    el.className = "choice";
    el.textContent = txt;
    el.dataset.correct = txt === correct ? "1" : "0";
    el.dataset.startY = String(startYs[i]);
    el.style.top = `${startYs[i]}px`;

    el.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      pick(el);
    });

    gameEl.appendChild(el);
    choices.push(el);
  });
}

function startLoop(){
  stopLoop();
  running = true;
  roundStartTs = performance.now();
  raf = requestAnimationFrame(tick);
}

function tick(ts){
  if(!running) return;

  const elapsed = (ts - roundStartTs) / 1000;
  const rect = gameEl.getBoundingClientRect();
  const bottomLimit = rect.height - floorHeight - choiceHeight;

  for(const el of choices){
    const startY = Number(el.dataset.startY);
    const y = startY + baseSpeed * elapsed;
    el.style.top = `${y}px`;

    if(y >= bottomLimit){
      fail("선택지가 바닥에 닿았습니다.");
      return;
    }
  }

  raf = requestAnimationFrame(tick);
}

startBtn.addEventListener("click", startGame);

restartBtn.addEventListener("click", () => {
  showOverlay(
    GAME_TITLE,
    `화면 위 영어 단어에 맞는 한국어를 터치하세요.<br><b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.`,
    true,
    false
  );
});

showOverlay(
  GAME_TITLE,
  `화면 위 영어 단어에 맞는 한국어를 터치하세요.<br><b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.`,
  true,
  false
);
</script>

</body>
</html>
