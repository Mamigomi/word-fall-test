<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>능률보카 고난도 Day 3 테스트</title>
<style>
  body{
    margin:0;
    background:#0b1220;
    color:#fff;
    font-family:system-ui, -apple-system, "Noto Sans KR", sans-serif;
    height:100vh;
    overflow:hidden;
    user-select:none;
    touch-action:manipulation;
  }
  #wrap{
    max-width:480px;
    margin:0 auto;
    height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    padding:14px;
    background:#111a2b;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  #english{
    font-size:22px;
    font-weight:800;
    letter-spacing:.2px;
  }
  #progress{
    margin-top:6px;
    font-size:13px;
    opacity:.85;
  }
  #game{
    flex:1;
    position:relative;
    overflow:hidden;
    background:#0f172a;
  }
  .floor{
    position:absolute;
    bottom:0; left:0; right:0;
    height:60px;
    background:rgba(255,80,80,.22);
    border-top:1px solid rgba(255,80,80,.45);
    text-align:center;
    line-height:60px;
    font-size:13px;
    z-index:2;
    pointer-events:none;
  }
  .choice{
    position:absolute;
    left:10px;
    right:10px;
    height:56px;
    background:#1e293b;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 10px;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    z-index:1;
    top:0;
  }
  .choice.good{
    background:#065f46;
    border-color:rgba(94,234,212,.35);
  }
  .choice.bad{
    background:#7f1d1d;
    border-color:rgba(251,113,133,.55);
  }

  #overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.72);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    z-index:3;
  }
  .card{
    background:#111a2b;
    padding:20px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    text-align:center;
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 18px 50px rgba(0,0,0,.35);
  }
  .card h2{
    margin:0 0 10px;
    font-size:20px;
  }
  .card p{
    margin:0 0 12px;
    font-size:13px;
    opacity:.9;
    line-height:1.5;
  }
  button{
    width:100%;
    margin-top:12px;
    padding:12px;
    font-size:15px;
    font-weight:900;
    border-radius:12px;
    border:none;
    background:#38bdf8;
    cursor:pointer;
  }
  button.secondary{
    background:#1f2a44;
    color:#fff;
    border:1px solid rgba(255,255,255,.10);
  }
</style>
</head>
<body>

<div id="wrap">
  <header>
    <div id="english">능률보카 고난도 Day 3 테스트</div>
    <div id="progress"></div>
  </header>

  <div id="game">
    <div class="floor">바닥 도달 = 즉시 불합격</div>

    <div id="overlay">
      <div class="card">
        <h2 id="ovTitle">능률보카 고난도 Day 3 테스트</h2>
        <p id="ovText">
          화면 위 영어 단어에 맞는 한국어를 터치하세요.<br>
          <b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.
        </p>
        <button id="startBtn">시험 시작</button>
        <button id="restartBtn" class="secondary" style="display:none;">다시 시작</button>
      </div>
    </div>
  </div>
</div>

<script>
const words = [
  { en:"ultimate", ko:"최종의, 궁극적인, 최고의" },
  { en:"captive", ko:"사로잡힌, 억류된 / 포로" },
  { en:"specific", ko:"구체적인, 명확한 / 특정한" },
  { en:"procedure", ko:"절차, 방법" },
  { en:"incredibly", ko:"믿을 수 없을 정도로, 엄청나게" },
  { en:"renewable", ko:"재생 가능한, 갱신 가능한" },
  { en:"narrative", ko:"이야기, 서술" },
  { en:"artifact", ko:"유물, 인공물" },
  { en:"characterize", ko:"특징을 나타내다, 특징짓다" },
  { en:"conception", ko:"개념, 생각, 구상" },
  { en:"justify", ko:"정당화하다" },
  { en:"portray", ko:"묘사하다, 표현하다" },
  { en:"conducive", ko:"(~에) 도움이 되는" },
  { en:"villain", ko:"악당, 악인" },
  { en:"enact", ko:"제정하다, 시행하다" },
  { en:"hibernation", ko:"동면, 겨울잠" },
  { en:"incident", ko:"사건, 일" },
  { en:"speculate", ko:"추측하다, 짐작하다 / 투기하다" },
  { en:"prescribe", ko:"처방하다, 규정하다" },
  { en:"strive", ko:"노력하다, 애쓰다" },
  { en:"connotation", ko:"함축 의미" },
  { en:"consensus", ko:"의견 일치, 합의" },
  { en:"disapprove", ko:"못마땅해하다, 반대하다" },
  { en:"motivate", ko:"동기를 부여하다, 자극하다" },
  { en:"utopian", ko:"이상적인, 유토피아적인" },
  { en:"distress", ko:"고통, 괴로움" },
  { en:"anthropology", ko:"인류학" },
  { en:"precisely", ko:"정확히, 정밀하게" },
  { en:"ratio", ko:"비율" },
  { en:"entity", ko:"독립체, 실체" },
  { en:"pound", ko:"치다, 두드리다 / (심장) 뛰다 / 파운드" },
  { en:"exhale", ko:"숨을 내쉬다" },
  { en:"mass", ko:"덩어리, 다량, 대중" },
  { en:"cease", ko:"중단하다, 그만두다" },
  { en:"entrepreneur", ko:"기업가" },
  { en:"blunt", ko:"무딘, 직설적인" },
  { en:"come off", ko:"떨어져 나가다 / 성공하다 / 인상을 주다" },
  { en:"put through", ko:"연결해 주다 / 겪게 하다" },
  { en:"turn around", ko:"돌아서다 / 호전시키다" },
  { en:"make up for", ko:"보상하다, 만회하다" },
  { en:"supreme", ko:"최고의" },
  { en:"extendable", ko:"연장 가능한" },
  { en:"renew", ko:"갱신하다, 재생하다" },
  { en:"renewal", ko:"갱신, 재생" },
  { en:"narrate", ko:"이야기하다" },
  { en:"narration", ko:"이야기하기, 내레이션" },
  { en:"character", ko:"성격, 특징" },
  { en:"characteristic", ko:"특징, 특성" },
  { en:"conceive", ko:"생각해내다, 상상하다" },
  { en:"justification", ko:"정당한 이유" },
  { en:"justifiable", ko:"정당한" },
  { en:"portrait", ko:"초상화" },
  { en:"portrayal", ko:"묘사, 표현" },
  { en:"conduct", ko:"(좋은 결과를) 이끌다" },
  { en:"hibernate", ko:"동면하다" },
  { en:"incidental", ko:"부수적인" },
  { en:"speculation", ko:"추측, 투기" },
  { en:"speculative", ko:"추측에 근거한" },
  { en:"prescription", ko:"처방전" },
  { en:"prescriptive", ko:"규범적인, 지시적인" },
  { en:"motivation", ko:"동기" },
  { en:"motivated", ko:"동기가 부여된" },
  { en:"motivational", ko:"동기를 주는" },
  { en:"utopia", ko:"유토피아" },
  { en:"distressed", ko:"괴로워하는" },
  { en:"distressing", ko:"괴로운" },
  { en:"anthropologist", ko:"인류학자" },
  { en:"precise", ko:"정확한" },
  { en:"precision", ko:"정확성" },
  { en:"massive", ko:"거대한" },
  { en:"massively", ko:"엄청나게" },
  { en:"bluntly", ko:"직설적으로" },
  { en:"consent", ko:"동의, 허락" }
];

const PASS_MESSAGE = "축하합니다. 능률보카 고난도 Day 3 테스트 통과!";
const baseSpeed = 110;
const floorHeight = 60;
const choiceHeight = 56;
const startYs = [-220, -320, -420, -520];

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const gameEl = document.getElementById("game");
const englishEl = document.getElementById("english");
const progressEl = document.getElementById("progress");

const overlayEl = document.getElementById("overlay");
const ovTitle = document.getElementById("ovTitle");
const ovText = document.getElementById("ovText");
const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");

let deck = [];
let idx = 0;
let choices = [];
let raf = null;
let running = false;
let roundStartTs = 0;
let locked = false;

function showOverlay(title, htmlText, showStart, showRestart){
  ovTitle.textContent = title;
  ovText.innerHTML = htmlText;
  overlayEl.style.display = "flex";
  startBtn.style.display = showStart ? "" : "none";
  restartBtn.style.display = showRestart ? "" : "none";
}

function hideOverlay(){
  overlayEl.style.display = "none";
}

function clearChoices(){
  for(const el of choices){
    el.remove();
  }
  choices = [];
}

function stopLoop(){
  running = false;
  if(raf){
    cancelAnimationFrame(raf);
    raf = null;
  }
}

function resetGame(){
  stopLoop();
  clearChoices();
  deck = shuffle(words);
  idx = 0;
  locked = false;
  englishEl.textContent = "능률보카 고난도 Day 3 테스트";
  progressEl.textContent = `0 / ${deck.length}`;
}

function startGame(){
  resetGame();
  hideOverlay();
  nextWord();
}

function nextWord(){
  if(idx >= deck.length){
    stopLoop();
    clearChoices();
    showOverlay(
      "합격",
      `<b style="font-size:18px;">${PASS_MESSAGE}</b><br><br>총 <b>${deck.length}</b>단어를 모두 통과했습니다.`,
      false,
      true
    );
    return;
  }

  locked = false;

  const w = deck[idx];
  englishEl.textContent = w.en;
  progressEl.textContent = `${idx + 1} / ${deck.length}`;

  spawnChoices(w);
  startLoop();
}

function fail(reason){
  stopLoop();
  clearChoices();
  showOverlay(
    "불합격",
    `${reason}<br><br><b>규칙:</b> 오답 선택 또는 어떤 선택지든 바닥 도달 시 즉시 종료됩니다.`,
    false,
    true
  );
}

function pick(el){
  if(!running || locked) return;
  locked = true;

  if(el.dataset.correct !== "1"){
    el.classList.add("bad");
    setTimeout(() => fail("오답을 선택했습니다."), 120);
    return;
  }

  el.classList.add("good");
  stopLoop();

  setTimeout(() => {
    clearChoices();
    idx += 1;
    nextWord();
  }, 180);
}

function spawnChoices(word){
  clearChoices();

  const correct = word.ko;
  const pool = Array.from(new Set(words.map(x => x.ko))).filter(v => v !== correct);
  const wrongs = shuffle(pool).slice(0, 3);
  const options = shuffle([correct, ...wrongs]);

  options.forEach((txt, i) => {
    const el = document.createElement("div");
    el.className = "choice";
    el.textContent = txt;
    el.dataset.correct = txt === correct ? "1" : "0";
    el.dataset.startY = String(startYs[i]);
    el.style.top = `${startYs[i]}px`;

    el.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      pick(el);
    });

    gameEl.appendChild(el);
    choices.push(el);
  });
}

function startLoop(){
  stopLoop();
  running = true;
  roundStartTs = performance.now();
  raf = requestAnimationFrame(tick);
}

function tick(ts){
  if(!running) return;

  const elapsed = (ts - roundStartTs) / 1000;
  const rect = gameEl.getBoundingClientRect();
  const bottomLimit = rect.height - floorHeight - choiceHeight;

  for(const el of choices){
    const startY = Number(el.dataset.startY);
    const y = startY + baseSpeed * elapsed;
    el.style.top = `${y}px`;

    if(y >= bottomLimit){
      fail("선택지가 바닥에 닿았습니다.");
      return;
    }
  }

  raf = requestAnimationFrame(tick);
}

startBtn.addEventListener("click", startGame);

restartBtn.addEventListener("click", () => {
  showOverlay(
    "능률보카 고난도 Day 3 테스트",
    `화면 위 영어 단어에 맞는 한국어를 터치하세요.<br><b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.`,
    true,
    false
  );
});

showOverlay(
  "능률보카 고난도 Day 3 테스트",
  `화면 위 영어 단어에 맞는 한국어를 터치하세요.<br><b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.`,
  true,
  false
);
</script>

</body>
</html>
