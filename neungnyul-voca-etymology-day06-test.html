<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>능률보카 어원편 Day 6 어휘 테스트</title>
<style>
  body{
    margin:0;
    background:#0b1220;
    color:#fff;
    font-family:system-ui, -apple-system, "Noto Sans KR", sans-serif;
    height:100vh;
    overflow:hidden;
    user-select:none;
    touch-action:manipulation;
  }
  #wrap{
    max-width:480px;
    margin:0 auto;
    height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    padding:14px;
    background:#111a2b;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  #english{
    font-size:22px;
    font-weight:800;
    letter-spacing:.2px;
  }
  #progress{
    margin-top:6px;
    font-size:13px;
    opacity:.85;
  }
  #game{
    flex:1;
    position:relative;
    overflow:hidden;
    background:#0f172a;
  }
  .floor{
    position:absolute;
    bottom:0; left:0; right:0;
    height:60px;
    background:rgba(255,80,80,.22);
    border-top:1px solid rgba(255,80,80,.45);
    text-align:center;
    line-height:60px;
    font-size:13px;
    z-index:2;
    pointer-events:none;
  }
  .choice{
    position:absolute;
    left:10px;
    right:10px;
    height:56px;
    background:#1e293b;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 10px;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    z-index:1;
    top:0;
  }
  .choice.good{
    background:#065f46;
    border-color:rgba(94,234,212,.35);
  }
  .choice.bad{
    background:#7f1d1d;
    border-color:rgba(251,113,133,.55);
  }

  #overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.72);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    z-index:3;
  }
  .card{
    background:#111a2b;
    padding:20px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    text-align:center;
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 18px 50px rgba(0,0,0,.35);
  }
  .card h2{
    margin:0 0 10px;
    font-size:20px;
  }
  .card p{
    margin:0 0 12px;
    font-size:13px;
    opacity:.9;
    line-height:1.5;
  }
  button{
    width:100%;
    margin-top:12px;
    padding:12px;
    font-size:15px;
    font-weight:900;
    border-radius:12px;
    border:none;
    background:#38bdf8;
    cursor:pointer;
  }
  button.secondary{
    background:#1f2a44;
    color:#fff;
    border:1px solid rgba(255,255,255,.10);
  }
</style>
</head>
<body>

<div id="wrap">
  <header>
    <div id="english">능률보카 어원편 Day 6 어휘 테스트</div>
    <div id="progress"></div>
  </header>

  <div id="game">
    <div class="floor">바닥 도달 = 즉시 불합격</div>

    <div id="overlay">
      <div class="card">
        <h2 id="ovTitle">능률보카 어원편 Day 6 어휘 테스트</h2>
        <p id="ovText">
          화면 위 영어 단어에 맞는 한국어를 터치하세요.<br>
          <b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.
        </p>
        <button id="startBtn">시험 시작</button>
        <button id="restartBtn" class="secondary" style="display:none;">다시 시작</button>
      </div>
    </div>
  </div>
</div>

<script>
const words = [
  { en:"submarine", ko:"잠수함" },
  { en:"suffer", ko:"고통을 겪다" },
  { en:"suffering", ko:"고통" },
  { en:"suggest", ko:"제안하다, 암시하다" },
  { en:"suggestion", ko:"제안, 암시" },
  { en:"support", ko:"지지하다, 부양하다, 받치다" },
  { en:"suppress", ko:"억압하다, 억제하다" },
  { en:"suppression", ko:"억압, 진압" },
  { en:"subconscious", ko:"잠재의식의" },
  { en:"subscribe", ko:"구독하다" },
  { en:"submerge", ko:"잠기다" },
  { en:"subtitle", ko:"자막" },
  { en:"antibiotic", ko:"항생제" },
  { en:"antibiotics", ko:"항생제들" },
  { en:"antibody", ko:"항체" },
  { en:"antigen", ko:"항원" },
  { en:"Antarctic", ko:"남극의" },
  { en:"Antarctica", ko:"남극" },
  { en:"superior", ko:"우수한, 상위의" },
  { en:"superiority", ko:"우월" },
  { en:"superb", ko:"뛰어난" },
  { en:"superficial", ko:"표면의, 피상적인" },
  { en:"surface", ko:"표면" },
  { en:"sovereign", ko:"주권이 있는, 자주의" },
  { en:"sovereignty", ko:"주권" },
  { en:"uphold", ko:"지지하다, 유지하다" },
  { en:"upright", ko:"똑바른, 정직한" },
  { en:"upset (adj.)", ko:"속상한, 화난" },
  { en:"upset (v.)", ko:"뒤집다" },
  { en:"upside", ko:"위쪽" },
  { en:"upside down", ko:"거꾸로" },
  { en:"update", ko:"갱신하다, 업데이트하다" },
  { en:"upgrade", ko:"향상시키다, 업그레이드하다" },
  { en:"advance", ko:"전진하다, 발전하다" },
  { en:"advanced", ko:"진보된" },
  { en:"advancement", ko:"발전, 진보" },
  { en:"in advance", ko:"미리" },
  { en:"progress", ko:"진보, 발전" },
  { en:"development", ko:"발전" },
  { en:"anticipate", ko:"예상하다, 기대하다" },
  { en:"anticipation", ko:"예상, 기대" },
  { en:"antique", ko:"골동품" },
  { en:"advantage", ko:"이점, 유리함" },
  { en:"advantageous", ko:"유리한" },
  { en:"take advantage of", ko:"이용하다" },
  { en:"ancestor", ko:"조상" },
  { en:"ancestral", ko:"조상의" },
  { en:"ancient", ko:"고대의" },
  { en:"supervise", ko:"감독하다" },
  { en:"supernatural", ko:"초자연적인" },
  { en:"surpass", ko:"능가하다" },
  { en:"survive", ko:"살아남다" },
  { en:"undergo", ko:"겪다" },
  { en:"go through", ko:"겪다" },
  { en:"propose", ko:"제안하다" },
  { en:"imply", ko:"암시하다" },
  { en:"indicate", ko:"나타내다" },
  { en:"restrain", ko:"억제하다" },
  { en:"put down", ko:"진압하다" },
  { en:"excellent", ko:"훌륭한" },
  { en:"outstanding", ko:"뛰어난" },
  { en:"terrific", ko:"멋진" },
  { en:"emerge", ko:"나타나다" },
  { en:"autonomous", ko:"자율적인" },
  { en:"emperor", ko:"황제" },
  { en:"monarch", ko:"군주" },
  { en:"sustain", ko:"유지하다" },
  { en:"develop", ko:"발전하다" },
  { en:"predict", ko:"예측하다" },
  { en:"foresee", ko:"예견하다" },
  { en:"expect", ko:"예상하다" },
  { en:"beneficial", ko:"유익한" },
  { en:"profitable", ko:"이익이 되는" },
  { en:"forefather", ko:"조상" },
  { en:"inferior", ko:"열등한" },
  { en:"profound", ko:"심오한" },
  { en:"downside", ko:"아래쪽" },
  { en:"retreat", ko:"후퇴" },
  { en:"disadvantage", ko:"불리함" },
  { en:"descendant", ko:"후손" },
  { en:"modern", ko:"현대의" }
];

const PASS_MESSAGE = "축하합니다. 능률보카 어원편 Day 6 어휘 테스트 통과!";
const baseSpeed = 110;
const floorHeight = 60;
const choiceHeight = 56;
const startYs = [-220, -320, -420, -520];

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const gameEl = document.getElementById("game");
const englishEl = document.getElementById("english");
const progressEl = document.getElementById("progress");

const overlayEl = document.getElementById("overlay");
const ovTitle = document.getElementById("ovTitle");
const ovText = document.getElementById("ovText");
const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");

let deck = [];
let idx = 0;
let choices = [];
let raf = null;
let running = false;
let roundStartTs = 0;
let locked = false;

function showOverlay(title, htmlText, showStart, showRestart){
  ovTitle.textContent = title;
  ovText.innerHTML = htmlText;
  overlayEl.style.display = "flex";
  startBtn.style.display = showStart ? "" : "none";
  restartBtn.style.display = showRestart ? "" : "none";
}

function hideOverlay(){
  overlayEl.style.display = "none";
}

function clearChoices(){
  for(const el of choices){
    el.remove();
  }
  choices = [];
}

function stopLoop(){
  running = false;
  if(raf){
    cancelAnimationFrame(raf);
    raf = null;
  }
}

function resetGame(){
  stopLoop();
  clearChoices();
  deck = shuffle(words);
  idx = 0;
  locked = false;
  englishEl.textContent = "능률보카 어원편 Day 6 어휘 테스트";
  progressEl.textContent = `0 / ${deck.length}`;
}

function startGame(){
  resetGame();
  hideOverlay();
  nextWord();
}

function nextWord(){
  if(idx >= deck.length){
    stopLoop();
    clearChoices();
    showOverlay(
      "합격",
      `<b style="font-size:18px;">${PASS_MESSAGE}</b><br><br>총 <b>${deck.length}</b>단어를 모두 통과했습니다.`,
      false,
      true
    );
    return;
  }

  locked = false;

  const w = deck[idx];
  englishEl.textContent = w.en;
  progressEl.textContent = `${idx + 1} / ${deck.length}`;

  spawnChoices(w);
  startLoop();
}

function fail(reason){
  stopLoop();
  clearChoices();
  showOverlay(
    "불합격",
    `${reason}<br><br><b>규칙:</b> 오답 선택 또는 어떤 선택지든 바닥 도달 시 즉시 종료됩니다.`,
    false,
    true
  );
}

function pick(el){
  if(!running || locked) return;
  locked = true;

  if(el.dataset.correct !== "1"){
    el.classList.add("bad");
    setTimeout(() => fail("오답을 선택했습니다."), 120);
    return;
  }

  el.classList.add("good");
  stopLoop();

  setTimeout(() => {
    clearChoices();
    idx += 1;
    nextWord();
  }, 180);
}

function spawnChoices(word){
  clearChoices();

  const correct = word.ko;
  const pool = Array.from(new Set(words.map(x => x.ko))).filter(v => v !== correct);
  const wrongs = shuffle(pool).slice(0, 3);
  const options = shuffle([correct, ...wrongs]);

  options.forEach((txt, i) => {
    const el = document.createElement("div");
    el.className = "choice";
    el.textContent = txt;
    el.dataset.correct = txt === correct ? "1" : "0";
    el.dataset.startY = String(startYs[i]);
    el.style.top = `${startYs[i]}px`;

    el.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      pick(el);
    });

    gameEl.appendChild(el);
    choices.push(el);
  });
}

function startLoop(){
  stopLoop();
  running = true;
  roundStartTs = performance.now();
  raf = requestAnimationFrame(tick);
}

function tick(ts){
  if(!running) return;

  const elapsed = (ts - roundStartTs) / 1000;
  const rect = gameEl.getBoundingClientRect();
  const bottomLimit = rect.height - floorHeight - choiceHeight;

  for(const el of choices){
    const startY = Number(el.dataset.startY);
    const y = startY + baseSpeed * elapsed;
    el.style.top = `${y}px`;

    if(y >= bottomLimit){
      fail("선택지가 바닥에 닿았습니다.");
      return;
    }
  }

  raf = requestAnimationFrame(tick);
}

startBtn.addEventListener("click", startGame);

restartBtn.addEventListener("click", () => {
  showOverlay(
    "능률보카 어원편 Day 6 어휘 테스트",
    `화면 위 영어 단어에 맞는 한국어를 터치하세요.<br><b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.`,
    true,
    false
  );
});

showOverlay(
  "능률보카 어원편 Day 6 어휘 테스트",
  `화면 위 영어 단어에 맞는 한국어를 터치하세요.<br><b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.`,
  true,
  false
);
</script>

</body>
</html>
