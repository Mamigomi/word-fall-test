<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>능률 VOCA DAY 05 어휘 테스트</title>
<style>
  body{
    margin:0;
    background:#0b1220;
    color:#fff;
    font-family:system-ui, -apple-system, "Noto Sans KR", sans-serif;
    height:100vh;
    overflow:hidden;
    user-select:none;
    touch-action:manipulation;
  }
  #wrap{
    max-width:480px;
    margin:0 auto;
    height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    padding:14px;
    background:#111a2b;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  #english{
    font-size:22px;
    font-weight:800;
    letter-spacing:.2px;
  }
  #progress{
    margin-top:6px;
    font-size:13px;
    opacity:.85;
  }
  #game{
    flex:1;
    position:relative;
    overflow:hidden;
    background:#0f172a;
  }
  .floor{
    position:absolute;
    bottom:0; left:0; right:0;
    height:60px;
    background:rgba(255,80,80,.22);
    border-top:1px solid rgba(255,80,80,.45);
    text-align:center;
    line-height:60px;
    font-size:13px;
    z-index:2;
    pointer-events:none;
  }
  .choice{
    position:absolute;
    left:10px;
    right:10px;
    height:56px;
    background:#1e293b;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 10px;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    z-index:1;
    top:0;
  }
  .choice.good{
    background:#065f46;
    border-color:rgba(94,234,212,.35);
  }
  .choice.bad{
    background:#7f1d1d;
    border-color:rgba(251,113,133,.55);
  }

  #overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.72);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    z-index:3;
  }
  .card{
    background:#111a2b;
    padding:20px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    text-align:center;
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 18px 50px rgba(0,0,0,.35);
  }
  .card h2{
    margin:0 0 10px;
    font-size:20px;
  }
  .card p{
    margin:0 0 12px;
    font-size:13px;
    opacity:.9;
    line-height:1.5;
  }
  button{
    width:100%;
    margin-top:12px;
    padding:12px;
    font-size:15px;
    font-weight:900;
    border-radius:12px;
    border:none;
    background:#38bdf8;
    cursor:pointer;
  }
  button.secondary{
    background:#1f2a44;
    color:#fff;
    border:1px solid rgba(255,255,255,.10);
  }
</style>
</head>
<body>

<div id="wrap">
  <header>
    <div id="english">DAY 05 어휘 테스트</div>
    <div id="progress"></div>
  </header>

  <div id="game">
    <div class="floor">바닥 도달 = 즉시 불합격</div>

    <div id="overlay">
      <div class="card">
        <h2 id="ovTitle">DAY 05 어휘 테스트</h2>
        <p id="ovText">
          화면 위 영어 단어에 맞는 한국어 뜻을 터치하세요.<br>
          <b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.
        </p>
        <button id="startBtn">시험 시작</button>
        <button id="restartBtn" class="secondary" style="display:none;">다시 시작</button>
      </div>
    </div>
  </div>
</div>

<script>
const words = [
  { en:"credit", ko:"신용, 신뢰" },
  { en:"adequate", ko:"충분한, 적절한" },
  { en:"symbolic", ko:"상징적인, 상징하는" },
  { en:"trait", ko:"특성, 특징" },
  { en:"lifespan", ko:"수명" },
  { en:"fragment", ko:"파편, 조각" },
  { en:"thorough", ko:"철저한, 빈틈없는" },
  { en:"oppose", ko:"반대하다" },
  { en:"summarize", ko:"요약하다, 간추리다" },
  { en:"instinct", ko:"본능, 직감" },
  { en:"array", ko:"모음, 집합" },
  { en:"glance", ko:"흘끗 보다" },
  { en:"disperse", ko:"흩어지다, 해산하다" },
  { en:"affinity", ko:"친밀감, 좋아함" },
  { en:"criterion", ko:"표준, 기준, 척도" },
  { en:"democratic", ko:"민주주의의, 민주적인" },
  { en:"analytical", ko:"분석적인, 분석의" },
  { en:"statistics", ko:"통계, 통계 자료" },
  { en:"slippery", ko:"미끄러운" },
  { en:"inevitable", ko:"불가피한, 필연적인" },
  { en:"prospect", ko:"가망, 가능성" },
  { en:"proposition", ko:"제안, 명제" },
  { en:"equivalent", ko:"동등한, 상당하는" },
  { en:"intake", ko:"섭취량" },
  { en:"diabetes", ko:"당뇨병" },
  { en:"confine", ko:"국한하다, 제한하다" },
  { en:"mobilize", ko:"동원하다, 결집시키다" },
  { en:"schema", ko:"개요, 도식" },
  { en:"feature", ko:"특징" },
  { en:"desperate", ko:"절망적인, 절박한" },
  { en:"empirical", ko:"경험[실험]에 따른, 실증적인" },
  { en:"drawback", ko:"결점, 문제점" },
  { en:"extension", ko:"연장, 확장" },
  { en:"extent", ko:"정도, 범위" },
  { en:"leak", ko:"새다, 누설하다" },
  { en:"conspicuous", ko:"눈에 잘 띄는, 뚜렷한" },
  { en:"stand for", ko:"나타내다, 의미하다" },
  { en:"pick on", ko:"괴롭히다" },
  { en:"bump into", ko:"우연히 마주치다, 부딪치다" },
  { en:"carry on", ko:"계속하다" }
];

const PASS_MESSAGE = "축하합니다. DAY 05 어휘 테스트 통과!";
const baseSpeed = 110;
const floorHeight = 60;
const choiceHeight = 56;
const startYs = [-220, -320, -420, -520];

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const gameEl = document.getElementById("game");
const englishEl = document.getElementById("english");
const progressEl = document.getElementById("progress");

const overlayEl = document.getElementById("overlay");
const ovTitle = document.getElementById("ovTitle");
const ovText = document.getElementById("ovText");
const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");

let deck = [];
let idx = 0;
let choices = [];
let raf = null;
let running = false;
let roundStartTs = 0;
let locked = false;

function showOverlay(title, htmlText, showStart, showRestart){
  ovTitle.textContent = title;
  ovText.innerHTML = htmlText;
  overlayEl.style.display = "flex";
  startBtn.style.display = showStart ? "" : "none";
  restartBtn.style.display = showRestart ? "" : "none";
}

function hideOverlay(){
  overlayEl.style.display = "none";
}

function clearChoices(){
  for(const el of choices){
    el.remove();
  }
  choices = [];
}

function stopLoop(){
  running = false;
  if(raf){
    cancelAnimationFrame(raf);
    raf = null;
  }
}

function resetGame(){
  stopLoop();
  clearChoices();
  deck = shuffle(words);
  idx = 0;
  locked = false;
  englishEl.textContent = "DAY 05 어휘 테스트";
  progressEl.textContent = `0 / ${deck.length}`;
}

function startGame(){
  resetGame();
  hideOverlay();
  nextWord();
}

function nextWord(){
  if(idx >= deck.length){
    stopLoop();
    clearChoices();
    showOverlay(
      "합격",
      `<b style="font-size:18px;">${PASS_MESSAGE}</b><br><br>총 <b>${deck.length}</b>개 어휘를 모두 통과했습니다.`,
      false,
      true
    );
    return;
  }

  locked = false;

  const w = deck[idx];
  englishEl.textContent = w.en;
  progressEl.textContent = `${idx + 1} / ${deck.length}`;

  spawnChoices(w);
  startLoop();
}

function fail(reason){
  stopLoop();
  clearChoices();
  showOverlay(
    "불합격",
    `${reason}<br><br><b>규칙:</b> 오답 선택 또는 어떤 선택지든 바닥 도달 시 즉시 종료됩니다.`,
    false,
    true
  );
}

function pick(el){
  if(!running || locked) return;
  locked = true;

  if(el.dataset.correct !== "1"){
    el.classList.add("bad");
    setTimeout(() => fail("오답을 선택했습니다."), 120);
    return;
  }

  el.classList.add("good");
  stopLoop();

  setTimeout(() => {
    clearChoices();
    idx += 1;
    nextWord();
  }, 180);
}

function spawnChoices(word){
  clearChoices();

  const correct = word.ko;
  const pool = Array.from(new Set(words.map(x => x.ko))).filter(v => v !== correct);
  const wrongs = shuffle(pool).slice(0, 3);
  const options = shuffle([correct, ...wrongs]);

  options.forEach((txt, i) => {
    const el = document.createElement("div");
    el.className = "choice";
    el.textContent = txt;
    el.dataset.correct = txt === correct ? "1" : "0";
    el.dataset.startY = String(startYs[i]);
    el.style.top = `${startYs[i]}px`;

    el.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      pick(el);
    });

    gameEl.appendChild(el);
    choices.push(el);
  });
}

function startLoop(){
  stopLoop();
  running = true;
  roundStartTs = performance.now();
  raf = requestAnimationFrame(tick);
}

function tick(ts){
  if(!running) return;

  const elapsed = (ts - roundStartTs) / 1000;
  const rect = gameEl.getBoundingClientRect();
  const bottomLimit = rect.height - floorHeight - choiceHeight;

  for(const el of choices){
    const startY = Number(el.dataset.startY);
    const y = startY + baseSpeed * elapsed;
    el.style.top = `${y}px`;

    if(y >= bottomLimit){
      fail("선택지가 바닥에 닿았습니다.");
      return;
    }
  }

  raf = requestAnimationFrame(tick);
}

startBtn.addEventListener("click", startGame);

restartBtn.addEventListener("click", () => {
  showOverlay(
    "DAY 05 어휘 테스트",
    `화면 위 영어 단어에 맞는 한국어 뜻을 터치하세요.<br><b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.`,
    true,
    false
  );
});

showOverlay(
  "DAY 05 어휘 테스트",
  `화면 위 영어 단어에 맞는 한국어 뜻을 터치하세요.<br><b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.`,
  true,
  false
);
</script>

</body>
</html>
