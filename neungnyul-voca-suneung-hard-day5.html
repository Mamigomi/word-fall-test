<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Word Flight Day 5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell">
    <section class="phone-frame">
      <header class="hud">
        <div class="hud-top">
          <div class="badge">WORD FLIGHT DAY 05</div>
          <div class="score-wrap">
            <span class="score-label">SCORE</span>
            <strong id="score">0</strong>
          </div>
        </div>
        <div class="prompt-card">
          <p class="prompt-label">위 영어 표현의 맞는 뜻을 들이받으세요</p>
          <h1 id="target-word">credit</h1>
        </div>
      </header>

      <section class="game-stage">
        <canvas id="gameCanvas" width="390" height="844" aria-label="Day 5 단어 비행 게임"></canvas>

        <div class="overlay" id="startOverlay">
          <div class="overlay-card">
            <p class="overlay-kicker">DAY 5 TEST</p>
            <h2>파생어까지 맞히기</h2>
            <p>
              이미지 속 Day 5 어휘와 파생어만 나옵니다.
              위 영어 표현의 정확한 한국어 뜻 카드만 맞히고, 오답 카드를 건드리면 게임오버입니다.
            </p>
            <button id="startButton" class="primary-button">게임 시작</button>
          </div>
        </div>

        <div class="overlay hidden" id="gameOverOverlay">
          <div class="overlay-card">
            <p class="overlay-kicker danger">GAME OVER</p>
            <h2 id="gameOverTitle">오답 뜻과 충돌했어요</h2>
            <p id="finalScoreText">최종 점수 0점</p>
            <button id="restartButton" class="primary-button">다시 하기</button>
          </div>
        </div>
      </section>

      <footer class="controls">
        <button class="control-button" id="leftButton" aria-label="왼쪽 이동">LEFT</button>
        <div class="control-hint">화면 드래그 또는 좌우 버튼 사용</div>
        <button class="control-button" id="rightButton" aria-label="오른쪽 이동">RIGHT</button>
      </footer>
    </section>
  </main>

  <script src="./game.js"></script>
</body>
</html>
