<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>능률보카 어원편 Day 10 어휘 테스트</title>
<style>
  body{
    margin:0;
    background:#0b1220;
    color:#fff;
    font-family:system-ui, -apple-system, "Noto Sans KR", sans-serif;
    height:100vh;
    overflow:hidden;
    user-select:none;
    touch-action:manipulation;
  }
  #wrap{
    max-width:480px;
    margin:0 auto;
    height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    padding:14px;
    background:#111a2b;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  #english{
    font-size:22px;
    font-weight:800;
    letter-spacing:.2px;
  }
  #progress{
    margin-top:6px;
    font-size:13px;
    opacity:.85;
  }
  #game{
    flex:1;
    position:relative;
    overflow:hidden;
    background:#0f172a;
  }
  .floor{
    position:absolute;
    bottom:0; left:0; right:0;
    height:60px;
    background:rgba(255,80,80,.22);
    border-top:1px solid rgba(255,80,80,.45);
    text-align:center;
    line-height:60px;
    font-size:13px;
    z-index:2;
    pointer-events:none;
  }
  .choice{
    position:absolute;
    left:10px;
    right:10px;
    height:56px;
    background:#1e293b;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 10px;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    z-index:1;
    top:0;
  }
  .choice.good{
    background:#065f46;
    border-color:rgba(94,234,212,.35);
  }
  .choice.bad{
    background:#7f1d1d;
    border-color:rgba(251,113,133,.55);
  }

  #overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.72);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    z-index:3;
  }
  .card{
    background:#111a2b;
    padding:20px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    text-align:center;
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 18px 50px rgba(0,0,0,.35);
  }
  .card h2{
    margin:0 0 10px;
    font-size:20px;
  }
  .card p{
    margin:0 0 12px;
    font-size:13px;
    opacity:.9;
    line-height:1.5;
  }
  button{
    width:100%;
    margin-top:12px;
    padding:12px;
    font-size:15px;
    font-weight:900;
    border-radius:12px;
    border:none;
    background:#38bdf8;
    cursor:pointer;
  }
  button.secondary{
    background:#1f2a44;
    color:#fff;
    border:1px solid rgba(255,255,255,.10);
  }
</style>
</head>
<body>

<div id="wrap">
  <header>
    <div id="english">능률보카 어원편 Day 10 어휘 테스트</div>
    <div id="progress"></div>
  </header>

  <div id="game">
    <div class="floor">바닥 도달 = 즉시 불합격</div>

    <div id="overlay">
      <div class="card">
        <h2 id="ovTitle">능률보카 어원편 Day 10 어휘 테스트</h2>
        <p id="ovText">
          화면 위 영어 단어에 맞는 한국어를 터치하세요.<br>
          <b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.
        </p>
        <button id="startBtn">시험 시작</button>
        <button id="restartBtn" class="secondary" style="display:none;">다시 시작</button>
      </div>
    </div>
  </div>
</div>

<script>
const words = [
  {en:"geography",ko:"지리학"},
  {en:"geographical",ko:"지리의"},
  {en:"geology",ko:"지질학"},
  {en:"geometry",ko:"기하학"},
  {en:"multiple",ko:"다수의, 다양한"},
  {en:"multiply",ko:"증가하다, 곱하다"},
  {en:"multimedia",ko:"멀티미디어"},
  {en:"multitude",ko:"다수"},
  {en:"a multitude of",ko:"수많은 ~"},
  {en:"crowd",ko:"군중"},
  {en:"mob",ko:"폭도"},
  {en:"group",ko:"집단"},
  {en:"monologue",ko:"독백"},
  {en:"monoculture",ko:"단일 재배, 단일 문화"},
  {en:"universe",ko:"우주"},
  {en:"universal",ko:"보편적인"},
  {en:"university",ko:"대학교"},
  {en:"uniform",ko:"제복, 동일한"},
  {en:"union",ko:"노동조합, 연합"},
  {en:"unique",ko:"독특한, 유일한"},
  {en:"unify",ko:"통합하다"},
  {en:"unification",ko:"통합"},
  {en:"unite",ko:"결합하다"},
  {en:"unity",ko:"통합, 일체감"},
  {en:"unit",ko:"단위"},
  {en:"bilingual",ko:"2개 국어 사용자"},
  {en:"balance",ko:"균형"},
  {en:"balance between A and B",ko:"A와 B 사이의 균형"},
  {en:"off balance",ko:"균형을 잃은"},
  {en:"duplicate",ko:"복사하다"},
  {en:"duplication",ko:"복제"},
  {en:"dual",ko:"이중의"},
  {en:"twilight",ko:"황혼"},
  {en:"dawn",ko:"새벽"},
  {en:"twist",ko:"비틀다"},
  {en:"triangle",ko:"삼각형"},
  {en:"triangular",ko:"삼각형의"},
  {en:"tribe",ko:"부족"},
  {en:"trivial",ko:"사소한"},
  {en:"numerous",ko:"많은"},
  {en:"many",ko:"많은"},
  {en:"increase",ko:"증가하다"},
  {en:"divide",ko:"나누다"},
  {en:"copy",ko:"복사하다"},
  {en:"reproduce",ko:"재생산하다"},
  {en:"repeat",ko:"반복하다"},
  {en:"double",ko:"두 배"},
  {en:"dusk",ko:"황혼"},
  {en:"decline",ko:"쇠퇴"},
  {en:"distort",ko:"왜곡하다"},
  {en:"alliance",ko:"연합"},
  {en:"unusual",ko:"특이한"},
  {en:"sole",ko:"유일한"},
  {en:"only",ko:"유일한"},
  {en:"single",ko:"하나"},
  {en:"join",ko:"결합하다"},
  {en:"identical",ko:"동일한"},
  {en:"constant",ko:"일정한"},
  {en:"cosmos",ko:"우주"},
  {en:"world",ko:"세계"},
  {en:"insignificant",ko:"하찮은"},
  {en:"trifling",ko:"사소한"},
  {en:"imbalance",ko:"불균형"},
  {en:"peak",ko:"절정"},
  {en:"usual",ko:"보통의"},
  {en:"common",ko:"일반적인"}
];

const PASS_MESSAGE = "축하합니다. 능률보카 어원편 Day 10 어휘 테스트 통과!";
const baseSpeed = 110;
const floorHeight = 60;
const choiceHeight = 56;
const startYs = [-220, -320, -420, -520];

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const gameEl = document.getElementById("game");
const englishEl = document.getElementById("english");
const progressEl = document.getElementById("progress");

const overlayEl = document.getElementById("overlay");
const ovTitle = document.getElementById("ovTitle");
const ovText = document.getElementById("ovText");
const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");

let deck = [];
let idx = 0;
let choices = [];
let raf = null;
let running = false;
let roundStartTs = 0;
let locked = false;

function showOverlay(title, htmlText, showStart, showRestart){
  ovTitle.textContent = title;
  ovText.innerHTML = htmlText;
  overlayEl.style.display = "flex";
  startBtn.style.display = showStart ? "" : "none";
  restartBtn.style.display = showRestart ? "" : "none";
}

function hideOverlay(){
  overlayEl.style.display = "none";
}

function clearChoices(){
  for(const el of choices){
    el.remove();
  }
  choices = [];
}

function stopLoop(){
  running = false;
  if(raf){
    cancelAnimationFrame(raf);
    raf = null;
  }
}

function resetGame(){
  stopLoop();
  clearChoices();
  deck = shuffle(words);
  idx = 0;
  locked = false;
  englishEl.textContent = "능률보카 어원편 Day 10 어휘 테스트";
  progressEl.textContent = `0 / ${deck.length}`;
}

function startGame(){
  resetGame();
  hideOverlay();
  nextWord();
}

function nextWord(){
  if(idx >= deck.length){
    stopLoop();
    clearChoices();
    showOverlay(
      "합격",
      `<b style="font-size:18px;">${PASS_MESSAGE}</b><br><br>총 <b>${deck.length}</b>단어를 모두 통과했습니다.`,
      false,
      true
    );
    return;
  }

  locked = false;

  const w = deck[idx];
  englishEl.textContent = w.en;
  progressEl.textContent = `${idx + 1} / ${deck.length}`;

  spawnChoices(w);
  startLoop();
}

function fail(reason){
  stopLoop();
  clearChoices();
  showOverlay(
    "불합격",
    `${reason}<br><br><b>규칙:</b> 오답 선택 또는 어떤 선택지든 바닥 도달 시 즉시 종료됩니다.`,
    false,
    true
  );
}

function pick(el){
  if(!running || locked) return;
  locked = true;

  if(el.dataset.correct !== "1"){
    el.classList.add("bad");
    setTimeout(() => fail("오답을 선택했습니다."), 120);
    return;
  }

  el.classList.add("good");
  stopLoop();

  setTimeout(() => {
    clearChoices();
    idx += 1;
    nextWord();
  }, 180);
}

function spawnChoices(word){
  clearChoices();

  const correct = word.ko;
  const pool = Array.from(new Set(words.map(x => x.ko))).filter(v => v !== correct);
  const wrongs = shuffle(pool).slice(0, 3);
  const options = shuffle([correct, ...wrongs]);

  options.forEach((txt, i) => {
    const el = document.createElement("div");
    el.className = "choice";
    el.textContent = txt;
    el.dataset.correct = txt === correct ? "1" : "0";
    el.dataset.startY = String(startYs[i]);
    el.style.top = `${startYs[i]}px`;

    el.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      pick(el);
    });

    gameEl.appendChild(el);
    choices.push(el);
  });
}

function startLoop(){
  stopLoop();
  running = true;
  roundStartTs = performance.now();
  raf = requestAnimationFrame(tick);
}

function tick(ts){
  if(!running) return;

  const elapsed = (ts - roundStartTs) / 1000;
  const rect = gameEl.getBoundingClientRect();
  const bottomLimit = rect.height - floorHeight - choiceHeight;

  for(const el of choices){
    const startY = Number(el.dataset.startY);
    const y = startY + baseSpeed * elapsed;
    el.style.top = `${y}px`;

    if(y >= bottomLimit){
      fail("선택지가 바닥에 닿았습니다.");
      return;
    }
  }

  raf = requestAnimationFrame(tick);
}

startBtn.addEventListener("click", startGame);

restartBtn.addEventListener("click", () => {
  showOverlay(
    "능률보카 어원편 Day 10 어휘 테스트",
    `화면 위 영어 단어에 맞는 한국어를 터치하세요.<br><b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.`,
    true,
    false
  );
});

showOverlay(
  "능률보카 어원편 Day 10 어휘 테스트",
  `화면 위 영어 단어에 맞는 한국어를 터치하세요.<br><b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.`,
  true,
  false
);
</script>

</body>
</html>
