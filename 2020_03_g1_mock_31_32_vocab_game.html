<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>2020년 6월 고1 모의고사 31~32번 어휘 단어 시험</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    background:#0b1220;
    color:#fff;
    font-family:system-ui, -apple-system, "Noto Sans KR", sans-serif;
    height:100vh;
    overflow:hidden;
    user-select:none;
    touch-action:manipulation;
  }
  #wrap{
    max-width:520px;
    margin:0 auto;
    height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    padding:14px 16px 12px;
    background:#111a2b;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .title{
    font-size:20px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:8px;
  }
  .sub{
    font-size:13px;
    color:#9fb0d1;
    line-height:1.5;
  }
  .topbar{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:10px;
  }
  .pill{
    background:#18243a;
    border:1px solid rgba(255,255,255,.08);
    border-radius:999px;
    padding:7px 10px;
    font-size:13px;
    font-weight:700;
  }
  #stage{
    position:relative;
    flex:1;
    overflow:hidden;
    background:
      radial-gradient(circle at 20% 10%, rgba(90,140,255,.18), transparent 28%),
      radial-gradient(circle at 80% 0%, rgba(90,255,180,.10), transparent 25%),
      linear-gradient(180deg, #0d1528 0%, #0b1220 100%);
  }
  #questionBox{
    position:absolute;
    left:12px;
    right:12px;
    top:12px;
    z-index:5;
    background:rgba(17,26,43,.92);
    border:1px solid rgba(255,255,255,.1);
    border-radius:18px;
    padding:14px 14px 12px;
    backdrop-filter:blur(8px);
    box-shadow:0 10px 30px rgba(0,0,0,.25);
  }
  #qType{
    font-size:12px;
    font-weight:800;
    color:#8fb3ff;
    margin-bottom:6px;
    letter-spacing:.2px;
  }
  #question{
    font-size:22px;
    font-weight:900;
    line-height:1.4;
    word-break:keep-all;
    margin-bottom:10px;
  }
  #hint{
    font-size:13px;
    color:#b9c7e3;
    line-height:1.5;
  }
  .falling{
    position:absolute;
    min-width:80px;
    max-width:84%;
    padding:10px 14px;
    border-radius:18px;
    background:#1d2b45;
    border:1px solid rgba(255,255,255,.10);
    color:#fff;
    font-weight:800;
    text-align:center;
    line-height:1.35;
    box-shadow:0 10px 20px rgba(0,0,0,.25);
    word-break:keep-all;
    pointer-events:none;
  }
  .correct{
    background:#133a24 !important;
    border-color:rgba(88,255,150,.35) !important;
  }
  .wrong{
    background:#472030 !important;
    border-color:rgba(255,110,140,.35) !important;
  }
  #inputArea{
    padding:12px;
    background:#111a2b;
    border-top:1px solid rgba(255,255,255,.08);
    display:flex;
    gap:8px;
  }
  #answerInput{
    flex:1;
    border:none;
    outline:none;
    background:#0b1220;
    color:#fff;
    border-radius:14px;
    padding:14px 14px;
    font-size:17px;
    font-weight:700;
    border:1px solid rgba(255,255,255,.1);
  }
  #answerInput::placeholder{
    color:#7182a7;
    font-weight:600;
  }
  button{
    border:none;
    outline:none;
    border-radius:14px;
    padding:0 16px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
  }
  #submitBtn{
    background:#5b8cff;
    color:#fff;
  }
  #restartBtn{
    background:#22c55e;
    color:#08130d;
  }
  #message{
    position:absolute;
    left:12px;
    right:12px;
    bottom:12px;
    z-index:5;
    text-align:center;
    font-size:14px;
    font-weight:800;
    color:#d4def5;
    background:rgba(17,26,43,.9);
    border:1px solid rgba(255,255,255,.08);
    border-radius:14px;
    padding:10px 12px;
  }
  #gameOver{
    position:absolute;
    inset:0;
    z-index:20;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(5,9,18,.78);
    backdrop-filter:blur(6px);
    padding:20px;
  }
  .card{
    width:min(92vw, 420px);
    background:#101a2d;
    border:1px solid rgba(255,255,255,.1);
    border-radius:24px;
    padding:24px 20px;
    text-align:center;
    box-shadow:0 18px 50px rgba(0,0,0,.35);
  }
  .card h2{
    margin:0 0 12px;
    font-size:28px;
    line-height:1.3;
  }
  .card p{
    margin:8px 0;
    color:#c5d1ea;
    font-size:16px;
    line-height:1.6;
  }
  .bigscore{
    font-size:42px;
    font-weight:900;
    margin:12px 0;
    color:#8fb3ff;
  }
</style>
</head>
<body>
<div id="wrap">
  <header>
    <div class="title">2020년 6월 고1 모의고사 31~32번 어휘 단어 시험</div>
    <div class="sub">뜻을 보고 영어를 정확히 입력하세요. 정답 말풍선을 빠르게 맞히는 타이핑형 게임입니다.</div>
    <div class="topbar">
      <div class="pill">점수 <span id="score">0</span></div>
      <div class="pill">목숨 <span id="lives">5</span></div>
      <div class="pill">문제 <span id="solved">0</span>/<span id="total">0</span></div>
      <div class="pill">속도 <span id="speedView">1.0x</span></div>
    </div>
  </header>

  <div id="stage">
    <div id="questionBox">
      <div id="qType">뜻 → 영어</div>
      <div id="question">문제가 준비되는 중입니다.</div>
      <div id="hint">띄어쓰기와 철자까지 정확히 입력해야 정답 처리됩니다.</div>
    </div>

    <div id="message">Enter 또는 제출 버튼으로 정답 확인</div>

    <div id="gameOver">
      <div class="card">
        <h2>게임 종료</h2>
        <div class="bigscore" id="finalScore">0점</div>
        <p id="finalSummary">결과 요약</p>
        <button id="restartBtn">다시 시작</button>
      </div>
    </div>
  </div>

  <div id="inputArea">
    <input id="answerInput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="영어 정답 입력">
    <button id="submitBtn">제출</button>
  </div>
</div>

<script>
const vocab = [
  // 31번
  { q: "인내, 인내심", a: "patience" },
  { q: "가장 중요하다", a: "be of the essence" },
  { q: "사과, 사죄", a: "apology" },
  { q: "받아들이다", a: "accept" },
  { q: "사람, 개인", a: "individual" },
  { q: "~의 말을 끝까지 듣다", a: "hear out" },
  { q: "남기다", a: "leave" },
  { q: "열린, 개방된", a: "open" },
  { q: "여부와 시기", a: "if and when" },
  { q: "소망하다", a: "wish" },
  { q: "화해하다", a: "reconcile" },
  { q: "알고 있는, 의식하는", a: "conscious" },
  { q: "단지 ~했다고 해서", a: "just because" },
  { q: "온전히, 완전히", a: "fully" },
  { q: "시간이 걸리다", a: "take time" },
  { q: "상처받은", a: "injured" },
  { q: "측, 당사자", a: "party" },
  { q: "완전히", a: "completely" },
  { q: "(걱정·근심 등을) 떨쳐 버리다", a: "let go" },
  { q: "믿다", a: "trust" },
  { q: "거의 없는", a: "little" },
  { q: "빨라지게 하다, 가속화하다", a: "speed up" },
  { q: "과정", a: "process" },
  { q: "사람", a: "person" },
  { q: "진정으로", a: "truly" },
  { q: "~하는 것이 가치가 있다", a: "be worthwhile to do" },
  { q: "공간", a: "space" },
  { q: "치유되다", a: "heal" },
  { q: "(이전 상황·상태)로 돌아가다", a: "go back to" },
  { q: "평상시처럼", a: "normally" },
  { q: "즉시, 곧", a: "immediately" },

  // 32번
  { q: "사업체", a: "business" },
  { q: "훌륭한", a: "excellent" },
  { q: "보통, 일반적으로", a: "typically" },
  { q: "~할 여유가 있다", a: "afford" },
  { q: "매우 적극적인, 공격적인", a: "aggressive" },
  { q: "~하는 방법", a: "way to v" },
  { q: "소문나게 하다", a: "get the word out" },
  { q: "광고", a: "advertising" },
  { q: "교환", a: "exchange" },
  { q: "광고주", a: "advertiser" },
  { q: "(광고를) 게시하다[내다]", a: "place" },
  { q: "배너", a: "banner" },
  { q: "서로", a: "each other" },
  { q: "무료로", a: "for free" },
  { q: "예를 들어", a: "for example" },
  { q: "미용 제품", a: "beauty product" },
  { q: "사이트", a: "site" },
  { q: "그 다음에는", a: "in turn" },
  { q: "둘 다 ~하지 않다", a: "neither" },
  { q: "비용을 청구하다", a: "charge" },
  { q: "광고", a: "ad" },
  { q: "공간", a: "space" },
  { q: "인기를 얻다", a: "gain in popularity" },
  { q: "특히", a: "especially" },
  { q: "~사이에", a: "among" },
  { q: "영업팀", a: "sales team" },
  { q: "교환하다", a: "trade" },
  { q: "출구", a: "outlet" },
  { q: "마케팅 담당자", a: "marketer" },
  { q: "~와 접촉하다", a: "reach" },
  { q: "목표 접속자", a: "target audience" },
  { q: "그러지 않으면", a: "otherwise" },
  { q: "~할 여유가 있다, 능력이 되다", a: "afford" }
];

const stage = document.getElementById("stage");
const questionEl = document.getElementById("question");
const qTypeEl = document.getElementById("qType");
const hintEl = document.getElementById("hint");
const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");
const solvedEl = document.getElementById("solved");
const totalEl = document.getElementById("total");
const speedViewEl = document.getElementById("speedView");
const msgEl = document.getElementById("message");
const inputEl = document.getElementById("answerInput");
const submitBtn = document.getElementById("submitBtn");
const gameOverEl = document.getElementById("gameOver");
const finalScoreEl = document.getElementById("finalScore");
const finalSummaryEl = document.getElementById("finalSummary");
const restartBtn = document.getElementById("restartBtn");

let score = 0;
let lives = 5;
let solved = 0;
let speedMultiplier = 1;
let current = null;
let currentBubble = null;
let bubbleY = 0;
let bubbleX = 0;
let animationId = null;
let bubbleSpeed = 0.9;
let playing = true;
let queue = [];
let wrongLock = false;

totalEl.textContent = vocab.length;

function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(text){
  return text
    .toLowerCase()
    .replace(/[’']/g, "'")
    .replace(/\s+/g, " ")
    .trim();
}

function setMessage(text){
  msgEl.textContent = text;
}

function makeQueue(){
  queue = shuffle(vocab);
}

function spawnQuestion(){
  if(!playing) return;

  if(queue.length === 0){
    endGame(true);
    return;
  }

  if(currentBubble){
    currentBubble.remove();
    currentBubble = null;
  }

  current = queue.shift();
  inputEl.value = "";
  wrongLock = false;

  qTypeEl.textContent = "뜻 → 영어";
  questionEl.textContent = current.q;
  hintEl.textContent = "정답 철자와 띄어쓰기를 정확히 입력하세요.";

  const bubble = document.createElement("div");
  bubble.className = "falling";
  bubble.textContent = current.a;

  stage.appendChild(bubble);

  const stageWidth = stage.clientWidth;
  const safeLeft = 10;
  const maxBubbleWidth = Math.min(stageWidth * 0.84, 320);

  bubble.style.maxWidth = maxBubbleWidth + "px";
  bubble.style.visibility = "hidden";
  bubble.style.left = "10px";
  bubble.style.top = "0px";

  requestAnimationFrame(() => {
    const bubbleWidth = bubble.offsetWidth;
    bubbleX = Math.max(safeLeft, Math.floor(Math.random() * Math.max(1, stageWidth - bubbleWidth - safeLeft * 2)) + safeLeft);
    bubbleY = 120;
    bubble.style.left = bubbleX + "px";
    bubble.style.top = bubbleY + "px";
    bubble.style.visibility = "visible";
  });

  currentBubble = bubble;
  bubbleSpeed = (0.85 + Math.random() * 0.35) * speedMultiplier;
  speedViewEl.textContent = speedMultiplier.toFixed(1) + "x";
  inputEl.focus();
}

function animate(){
  if(!playing) return;

  if(currentBubble){
    bubbleY += bubbleSpeed;
    currentBubble.style.top = bubbleY + "px";

    const bottomLimit = stage.clientHeight - 70;
    if(bubbleY >= bottomLimit){
      loseLife("놓쳤습니다! 정답: " + current.a);
    }
  }

  animationId = requestAnimationFrame(animate);
}

function correctAnswer(){
  if(!current || !currentBubble) return;

  currentBubble.classList.add("correct");
  score += 10;
  solved += 1;

  if(solved % 5 === 0){
    speedMultiplier += 0.08;
  }

  scoreEl.textContent = score;
  solvedEl.textContent = solved;
  speedViewEl.textContent = speedMultiplier.toFixed(1) + "x";
  setMessage("정답! " + current.q + " = " + current.a);

  const bubbleToRemove = currentBubble;
  currentBubble = null;
  current = null;

  setTimeout(() => {
    if(bubbleToRemove) bubbleToRemove.remove();
    spawnQuestion();
  }, 260);
}

function loseLife(message){
  if(!playing) return;

  if(currentBubble){
    currentBubble.classList.add("wrong");
  }

  lives -= 1;
  livesEl.textContent = lives;
  setMessage(message);

  const bubbleToRemove = currentBubble;
  currentBubble = null;
  current = null;

  if(lives <= 0){
    setTimeout(() => endGame(false), 280);
    return;
  }

  setTimeout(() => {
    if(bubbleToRemove) bubbleToRemove.remove();
    spawnQuestion();
  }, 320);
}

function submitAnswer(){
  if(!playing || !current || wrongLock) return;

  const user = normalize(inputEl.value);
  const answer = normalize(current.a);

  if(!user){
    setMessage("정답을 입력해 주세요.");
    return;
  }

  if(user === answer){
    correctAnswer();
  } else {
    wrongLock = true;
    setMessage("오답입니다. 다시 입력해 보세요.");
    setTimeout(() => {
      wrongLock = false;
      inputEl.focus();
    }, 250);
  }
}

function endGame(clear){
  playing = false;
  cancelAnimationFrame(animationId);

  if(currentBubble){
    currentBubble.remove();
    currentBubble = null;
  }

  finalScoreEl.textContent = score + "점";
  if(clear){
    finalSummaryEl.textContent = "축하합니다. 모든 어휘를 끝까지 완료했습니다. 총 " + solved + "문제를 맞혔습니다.";
  } else {
    finalSummaryEl.textContent = "맞힌 문제 수: " + solved + "개 / 남은 생명이 모두 소진되었습니다.";
  }
  gameOverEl.style.display = "flex";
}

function startGame(){
  score = 0;
  lives = 5;
  solved = 0;
  speedMultiplier = 1;
  current = null;
  wrongLock = false;
  playing = true;

  scoreEl.textContent = score;
  livesEl.textContent = lives;
  solvedEl.textContent = solved;
  speedViewEl.textContent = speedMultiplier.toFixed(1) + "x";
  gameOverEl.style.display = "none";
  setMessage("게임 시작! 뜻을 보고 영어를 입력하세요.");

  document.querySelectorAll(".falling").forEach(el => el.remove());

  makeQueue();
  spawnQuestion();
  cancelAnimationFrame(animationId);
  animate();

  setTimeout(() => inputEl.focus(), 50);
}

submitBtn.addEventListener("click", submitAnswer);
inputEl.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    submitAnswer();
  }
});
restartBtn.addEventListener("click", startGame);

startGame();
</script>
</body>
</html>
