<style>
  body{
    margin:0;
    background:#0b1220;
    color:#fff;
    font-family:system-ui, -apple-system, "Noto Sans KR", sans-serif;
    height:100vh;
    overflow:hidden;
    user-select:none;
    touch-action: manipulation;
  }
  #wrap{
    max-width:480px;
    margin:0 auto;
    height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  header{
    padding:14px;
    background:#111a2b;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  #english{
    font-size:22px;
    font-weight:800;
  }
  #progress{
    margin-top:6px;
    font-size:13px;
    opacity:.85;
  }
  #game{
    flex:1;
    position:relative;
    overflow:hidden;
    background:#0f172a;
  }
  .floor{
    position:absolute;
    bottom:0; left:0; right:0;
    height:60px;
    background:rgba(255,80,80,.22);
    border-top:1px solid rgba(255,80,80,.45);
    text-align:center;
    line-height:60px;
    font-size:13px;
    z-index:2;
    pointer-events:none;
  }
  .choice{
    position:absolute;
    left:10px; right:10px;
    height:56px;
    background:#1e293b;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 10px;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.10);
    box-shadow: 0 10px 25px rgba(0,0,0,.25);
    transition: transform .08s ease, background .12s ease;
  }
  .choice:active{ transform: scale(.98); }
  .choice.good{ background:#065f46; }
  .choice.bad{ background:#7f1d1d; }

  #overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.72);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
  }
  .card{
    background:#111a2b;
    padding:20px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    text-align:center;
  }
  button{
    width:100%;
    margin-top:12px;
    padding:12px;
    font-size:15px;
    font-weight:900;
    border-radius:12px;
    border:none;
    background:#38bdf8;
    cursor:pointer;
  }
</style>
</head>
<body>

<div id="wrap">
  <header>
    <div id="english">단어 시험</div>
    <div id="progress"></div>
  </header>

  <div id="game">
    <div class="floor">바닥 도달 = 즉시 불합격</div>

    <div id="overlay">
      <div class="card">
        <h2 id="ovTitle">단어 시험 시작</h2>
        <p id="ovText">
          영어 단어에 맞는 한국어를 터치하세요.<br>
          하나라도 바닥에 닿으면 종료됩니다.
        </p>
        <button id="startBtn">시험 시작</button>
      </div>
    </div>
  </div>
</div>

const PASS_MESSAGE="축하합니다. 2025년 3월 고1 모의고사 41~45번 어휘 통과!";
const baseSpeed=110;
const floorHeight=60;
const choiceHeight=56;

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

const gameEl=document.getElementById("game");
const englishEl=document.getElementById("english");
const progressEl=document.getElementById("progress");
const overlay=document.getElementById("overlay");
const startBtn=document.getElementById("startBtn");

let deck=[],idx=0,speed=baseSpeed,choices=[],raf=null,running=false,lastTs=0;

function resetGame(){
  deck=shuffle(words);
  idx=0;
  progressEl.textContent=`0 / ${deck.length}`;
}

function startGame(){
  resetGame();
  overlay.style.display="none";
  nextWord();
}

function nextWord(){
  if(idx>=deck.length){
    alert(PASS_MESSAGE);
    location.reload();
    return;
  }
  const w=deck[idx];
  englishEl.textContent=w.en;
  progressEl.textContent=`${idx+1} / ${deck.length}`;
  spawnChoices(w);
  startLoop();
}

function spawnChoices(word){
  clearChoices();
  const correct=word.ko;
  const pool=Array.from(new Set(words.map(x=>x.ko))).filter(k=>k!==correct);
  const wrongs=shuffle(pool).slice(0,3);
  const options=shuffle([correct,...wrongs]);
  const startYs=[-220,-320,-420,-520];

  options.forEach((txt,i)=>{
    const el=document.createElement("div");
    el.className="choice";
    el.textContent=txt;
    el.dataset.correct=(txt===correct)?"1":"0";
    el._y=startYs[i];
    el.addEventListener("click",()=>pick(el));
    el.style.transform=`translateY(${el._y}px)`;
    gameEl.appendChild(el);
    choices.push(el);
  });
}

function clearChoices(){
  choices.forEach(el=>el.remove());
  choices=[];
}

function pick(el){
  if(!running)return;
  if(el.dataset.correct!=="1"){
    alert("오답입니다.");
    location.reload();
    return;
  }
  stopLoop();
  idx++;
  nextWord();
}

function startLoop(){
  running=true;
  lastTs=performance.now();
  raf=requestAnimationFrame(tick);
}

function stopLoop(){
  running=false;
  cancelAnimationFrame(raf);
}

function tick(ts){
  if(!running)return;
  const dt=(ts-lastTs)/1000;
  lastTs=ts;
  const rect=gameEl.getBoundingClientRect();
  const bottomLimit=rect.height-floorHeight-choiceHeight;

  for(const el of choices){
    el._y+=speed*dt;
    el.style.transform=`translateY(${el._y}px)`;
    if(el._y>=bottomLimit){
      alert("바닥에 닿았습니다.");
      location.reload();
      return;
    }
  }
  raf=requestAnimationFrame(tick);
}

startBtn.addEventListener("click",startGame);
