<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>중2 시사 김은형 1과 어휘 테스트</title>

<style>
body{
  margin:0;
  background:#0b1220;
  color:#fff;
  font-family:system-ui;
  overflow:hidden;
}
#wrap{
  max-width:480px;
  margin:0 auto;

}

}

}

}

  left:10px;
  right:10px;
  height:50px;
  background:#1f2a44;
  border-radius:10px;
  text-align:center;
  line-height:50px;
  cursor:pointer;
}

</head>

<body>
<div id="wrap">

<header>
  <div id="english">READY</div>
</header>

<div id="game"></div>

</div>

<script>

{q:"goggles", a:"고글"},

{q:"go to sleep", a:"잠들다"},
{q:"play", a:"재생하다"},
{q:"Sweet dreams!", a:"좋은 꿈 꿔!"}
];

let current = 0;

function nextQuestion(){
  if(current >= words.length){
    alert("완료! 🎉");
    return;
  }

  const game = document.getElementById("game");
  game.innerHTML = "";

  const q = words[current];
  document.getElementById("english").innerText = q.q;

  let choices = [q.a];

  while(choices.length < 4){
    const rand = words[Math.floor(Math.random()*words.length)].a;
    if(!choices.includes(rand)) choices.push(rand);
  }

  choices.sort(()=>Math.random()-0.5);

  choices.forEach((c,i)=>{
    const div = document.createElement("div");
    div.className = "choice";
    div.style.top = (i*70+50)+"px";
    div.innerText = c;

    div.onclick = ()=>{
      if(c === q.a){
        current++;
        nextQuestion();
      }else{
        alert("틀림 ❌");
      }
    };

    game.appendChild(div);
  });
}

nextQuestion();

</script>
