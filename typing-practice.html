<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>필사 타자연습</title>
<style>
body{
  font-family: "Noto Sans KR", sans-serif;
  background:#0f172a;
  color:#fff;
  margin:0;
  padding:20px;
}
h1{margin-bottom:10px;}
select,button{
  padding:8px;
  margin:5px 0;
}
#quoteBox{
  background:#1e293b;
  padding:15px;
  border-radius:8px;
  margin:15px 0;
}
textarea{
  width:100%;
  height:120px;
  padding:10px;
  font-size:16px;
}
#result{
  margin-top:10px;
  font-weight:bold;
}
.correct{color:#22c55e;}
.wrong{color:#ef4444;}
</style>
</head>
<body>

<h1>📚 필사 타자연습</h1>

<select id="category">
<option value="quote">명언</option>
<option value="economy">경제 영어</option>
<option value="novel">고전 문학</option>
<option value="bible">성경</option>
<option value="exam">수능 스타일</option>
</select>

<button onclick="loadText()">문장 불러오기</button>

<div id="quoteBox"></div>

<textarea id="inputBox" placeholder="여기에 그대로 필사하세요..."></textarea>

<button onclick="checkTyping()">확인</button>

<div id="result"></div>

<script>
const texts = {
quote:[
"성공은 준비된 사람에게 기회가 왔을 때 일어난다.",
"Action is the foundational key to all success.",
"오늘 걷지 않으면 내일은 뛰어야 한다."
],
economy:[
"Inflation reduces purchasing power over time.",
"High interest rates can slow economic growth.",
"Supply and demand determine market prices."
],
novel:[
"모든 행복한 가정은 서로 닮았고, 불행한 가정은 제각기 불행하다.",
"It was the best of times, it was the worst of times."
],
bible:[
"In the beginning God created the heavens and the earth.",
"여호와는 나의 목자시니 내가 부족함이 없으리로다."
],
exam:[
"Humans tend to overestimate short-term gains and underestimate long-term risks.",
"Technological innovation often reshapes social structures."
]
};

let currentText = "";

function loadText(){
  const category = document.getElementById("category").value;
  const arr = texts[category];
  currentText = arr[Math.floor(Math.random()*arr.length)];
  document.getElementById("quoteBox").innerText = currentText;
  document.getElementById("inputBox").value="";
  document.getElementById("result").innerText="";
}

function checkTyping(){
  const userInput = document.getElementById("inputBox").value;
  if(userInput === currentText){
    document.getElementById("result").innerHTML="<span class='correct'>정확합니다! 🎉</span>";
  }else{
    document.getElementById("result").innerHTML="<span class='wrong'>오타가 있습니다. 다시 확인하세요.</span>";
  }
}
</script>

</body>
</html>
