<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>양정중2학년 1학기 중간고사대비 2과 어휘 테스트</title>
<style>
  body{
    margin:0;
    background:#0b1220;
    color:#fff;
    font-family:system-ui, -apple-system, "Noto Sans KR", sans-serif;
    height:100vh;
    overflow:hidden;
    user-select:none;
    touch-action:manipulation;
  }
  #wrap{
    max-width:480px;
    margin:0 auto;
    height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    padding:14px;
    background:#111a2b;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  #english{
    font-size:22px;
    font-weight:800;
    letter-spacing:.2px;
  }
  #progress{
    margin-top:6px;
    font-size:13px;
    opacity:.85;
  }
  #game{
    flex:1;
    position:relative;
    overflow:hidden;
    background:#0f172a;
  }
  .floor{
    position:absolute;
    bottom:0; left:0; right:0;
    height:60px;
    background:rgba(255,80,80,.22);
    border-top:1px solid rgba(255,80,80,.45);
    text-align:center;
    line-height:60px;
    font-size:13px;
    z-index:2;
    pointer-events:none;
  }
  .choice{
    position:absolute;
    left:10px;
    right:10px;
    height:56px;
    background:#1e293b;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 10px;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    z-index:1;
    top:0;
  }
  .choice.good{
    background:#065f46;
    border-color:rgba(94,234,212,.35);
  }
  .choice.bad{
    background:#7f1d1d;
    border-color:rgba(251,113,133,.55);
  }

  #overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.72);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    z-index:3;
  }
  .card{
    background:#111a2b;
    padding:20px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    text-align:center;
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 18px 50px rgba(0,0,0,.35);
  }
  .card h2{
    margin:0 0 10px;
    font-size:20px;
  }
  .card p{
    margin:0 0 12px;
    font-size:13px;
    opacity:.9;
    line-height:1.5;
  }
  button{
    width:100%;
    margin-top:12px;
    padding:12px;
    font-size:15px;
    font-weight:900;
    border-radius:12px;
    border:none;
    background:#38bdf8;
    cursor:pointer;
  }
  button.secondary{
    background:#1f2a44;
    color:#fff;
    border:1px solid rgba(255,255,255,.10);
  }
</style>
</head>
<body>

<div id="wrap">
  <header>
    <div id="english">양정중2학년 1학기 중간고사대비 2과 어휘 테스트</div>
    <div id="progress"></div>
  </header>

  <div id="game">
    <div class="floor">바닥 도달 = 즉시 불합격</div>

    <div id="overlay">
      <div class="card">
        <h2 id="ovTitle">단어 시험 시작</h2>
        <p id="ovText">
          화면 위 영어 단어에 맞는 한국어를 터치하세요.<br>
          <b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.
        </p>
        <button id="startBtn">시험 시작</button>
        <button id="restartBtn" class="secondary" style="display:none;">다시 시작</button>
      </div>
    </div>
  </div>
</div>

<script>
const words = [
  { en:"complete", ko:"완료하다, 끝내다" },
  { en:"count", ko:"세다" },
  { en:"daily", ko:"매일의, 일상의" },
  { en:"emoji", ko:"이모티콘" },
  { en:"habit", ko:"습관" },
  { en:"mission", ko:"임무, 목표" },
  { en:"nut", ko:"견과류" },
  { en:"regular", ko:"규칙적인, 보통의" },
  { en:"skip", ko:"거르다, 건너뛰다" },
  { en:"whole", ko:"전체의" },
  { en:"a day", ko:"하루에" },
  { en:"all at once", ko:"한 번에" },
  { en:"A to B", ko:"A에서 B까지" },
  { en:"be good for", ko:"~에 좋다" },
  { en:"can’t wait to", ko:"~하고 싶다" },
  { en:"hear of", ko:"~에 대해 듣다" },
  { en:"lots of", ko:"많은" },
  { en:"sleep cycle", ko:"수면 주기" },
  { en:"try ~ing", ko:"~해 보다" },
  { en:"water-drinking habit", ko:"물을 마시는 습관" },
  { en:"about", ko:"~에 대하여" },
  { en:"awesome", ko:"멋진, 굉장한" },
  { en:"choice", ko:"선택" },
  { en:"comment", ko:"댓글, 코멘트" },
  { en:"effect", ko:"영향, 효과" },
  { en:"exercise", ko:"운동하다" },
  { en:"fat", ko:"지방, 뚱뚱한" },
  { en:"friendly", ko:"친절한" },
  { en:"help", ko:"도움이 되다" },
  { en:"ingredient", ko:"재료" },
  { en:"instead", ko:"대신에" },
  { en:"introduce", ko:"소개하다" },
  { en:"low", ko:"낮은" },
  { en:"mineral", ko:"미네랄" },
  { en:"negative", ko:"부정적인" },
  { en:"noodles", ko:"국수" },
  { en:"post", ko:"게시글" },
  { en:"realize", ko:"깨닫다" },
  { en:"reduce", ko:"줄이다" },
  { en:"salty", ko:"짠" },
  { en:"since", ko:"~부터" },
  { en:"slogan", ko:"슬로건" },
  { en:"snack", ko:"간식" },
  { en:"step", ko:"단계" },
  { en:"stomach", ko:"위, 복부" },
  { en:"sugary", ko:"설탕이 든" },
  { en:"thirsty", ko:"목마른" },
  { en:"unhealthy", ko:"건강하지 않은" },
  { en:"convenience store", ko:"편의점" },
  { en:"from now on", ko:"지금부터" },
  { en:"full of", ko:"~로 가득한" },
  { en:"get home", ko:"집에 도착하다" },
  { en:"give it a try", ko:"시도해 보다" },
  { en:"have fun ~ing", ko:"즐겁게 ~하다" },
  { en:"herbal tea", ko:"허브티" },
  { en:"on one’s way home", ko:"집에 오는 길에" },
  { en:"soft drink", ko:"탄산음료" },
  { en:"Thanks for", ko:"~에 대해 고마워하다" },
  { en:"adult", ko:"성인" },
  { en:"bean", ko:"콩" },
  { en:"creamy", ko:"크림 같은" },
  { en:"dairy", ko:"유제품" },
  { en:"fiber", ko:"식이섬유" },
  { en:"grain", ko:"곡물" },
  { en:"kitten", ko:"새끼 고양이" },
  { en:"low in", ko:"~이 적은" },
  { en:"muscle", ko:"근육" },
  { en:"protein", ko:"단백질" },
  { en:"recommend", ko:"추천하다" },
  { en:"refreshing", ko:"상쾌한" },
  { en:"sometime", ko:"언젠가" },
  { en:"taste like", ko:"~와 같은 맛이 나다" }
];

const PASS_MESSAGE = "축하합니다. 양정중2학년 1학기 중간고사대비 2과 어휘 테스트 통과!";
const baseSpeed = 110;
const floorHeight = 60;
const choiceHeight = 56;
const startYs = [-220, -320, -420, -520];

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const gameEl = document.getElementById("game");
const englishEl = document.getElementById("english");
const progressEl = document.getElementById("progress");

const overlayEl = document.getElementById("overlay");
const ovTitle = document.getElementById("ovTitle");
const ovText = document.getElementById("ovText");
const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");

let deck = [];
let idx = 0;
let choices = [];
let raf = null;
let running = false;
let roundStartTs = 0;
let locked = false;

function showOverlay(title, htmlText, showStart, showRestart){
  ovTitle.textContent = title;
  ovText.innerHTML = htmlText;
  overlayEl.style.display = "flex";
  startBtn.style.display = showStart ? "" : "none";
  restartBtn.style.display = showRestart ? "" : "none";
}

function hideOverlay(){
  overlayEl.style.display = "none";
}

function clearChoices(){
  for(const el of choices){
    el.remove();
  }
  choices = [];
}

function stopLoop(){
  running = false;
  if(raf){
    cancelAnimationFrame(raf);
    raf = null;
  }
}

function resetGame(){
  stopLoop();
  clearChoices();
  deck = shuffle(words);
  idx = 0;
  locked = false;
  englishEl.textContent = "양정중2학년 1학기 중간고사대비 2과 어휘 테스트";
  progressEl.textContent = `0 / ${deck.length}`;
}

function startGame(){
  resetGame();
  hideOverlay();
  nextWord();
}

function nextWord(){
  if(idx >= deck.length){
    stopLoop();
    clearChoices();
    showOverlay(
      "합격",
      `<b style="font-size:18px;">${PASS_MESSAGE}</b><br><br>총 <b>${deck.length}</b>단어를 모두 통과했습니다.`,
      false,
      true
    );
    return;
  }

  locked = false;

  const w = deck[idx];
  englishEl.textContent = w.en;
  progressEl.textContent = `${idx + 1} / ${deck.length}`;

  spawnChoices(w);
  startLoop();
}

function fail(reason){
  stopLoop();
  clearChoices();
  showOverlay(
    "불합격",
    `${reason}<br><br><b>규칙:</b> 오답 선택 또는 어떤 선택지든 바닥 도달 시 즉시 종료됩니다.`,
    false,
    true
  );
}

function pick(el){
  if(!running || locked) return;
  locked = true;

  if(el.dataset.correct !== "1"){
    el.classList.add("bad");
    setTimeout(() => fail("오답을 선택했습니다."), 120);
    return;
  }

  el.classList.add("good");
  stopLoop();

  setTimeout(() => {
    clearChoices();
    idx += 1;
    nextWord();
  }, 180);
}

function spawnChoices(word){
  clearChoices();

  const correct = word.ko;
  const pool = Array.from(new Set(words.map(x => x.ko))).filter(v => v !== correct);
  const wrongs = shuffle(pool).slice(0, 3);
  const options = shuffle([correct, ...wrongs]);

  options.forEach((txt, i) => {
    const el = document.createElement("div");
    el.className = "choice";
    el.textContent = txt;
    el.dataset.correct = txt === correct ? "1" : "0";
    el.dataset.startY = String(startYs[i]);
    el.style.top = `${startYs[i]}px`;

    el.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      pick(el);
    });

    gameEl.appendChild(el);
    choices.push(el);
  });
}

function startLoop(){
  stopLoop();
  running = true;
  roundStartTs = performance.now();
  raf = requestAnimationFrame(tick);
}

function tick(ts){
  if(!running) return;

  const elapsed = (ts - roundStartTs) / 1000;
  const rect = gameEl.getBoundingClientRect();
  const bottomLimit = rect.height - floorHeight - choiceHeight;

  for(const el of choices){
    const startY = Number(el.dataset.startY);
    const y = startY + baseSpeed * elapsed;
    el.style.top = `${y}px`;

    if(y >= bottomLimit){
      fail("선택지가 바닥에 닿았습니다.");
      return;
    }
  }

  raf = requestAnimationFrame(tick);
}

startBtn.addEventListener("click", startGame);

restartBtn.addEventListener("click", () => {
  showOverlay(
    "단어 시험 시작",
    `화면 위 영어 단어에 맞는 한국어를 터치하세요.<br><b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.`,
    true,
    false
  );
});

showOverlay(
  "단어 시험 시작",
  `화면 위 영어 단어에 맞는 한국어를 터치하세요.<br><b>4개 중 하나라도 바닥에 닿으면 즉시 불합격</b>입니다.`,
  true,
  false
);
</script>

</body>
</html>
